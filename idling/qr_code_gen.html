<html>
	<head>
	</head>
    <style>


        body,
        html{
          height: 100%;
          text-align: center;
          font-size: 20px;
          font-family: Ubuntu, sans-serif;
        }
        body:before,
        .btn {
          display: inline-block;
          vertical-align: middle;
        }
        body:before {
          height: 100%;
        }
        .btn,
        .btn:before,
        .btn:after {
          cursor: pointer;
          padding: 0.5em 1.5em;
          display: inline-block;
          background-color: rgba(127, 157, 181, 0.6);
          color: #fff;
          border-radius: 16px;
          position: relative;
          -webkit-transition: all 0.6s cubic-bezier(0.5, 0, 0.5, 1);
          transition: all 0.6s cubic-bezier(0.5, 2.5, 0.5, 1);
          box-shadow: 0 0 0 rgba(0,0,0,0);
        }

        .btn:before,
        .btn:after {
          position: absolute;
          content: attr(data-title);
          z-index: -1;
        }

        .btn:before {
          top: -0.3em;
          right: -0.3em;
          background-color: rgba(255, 255, 0, 1);
        }

        .btn:after {
          bottom: -0.3em;
          left: -0.3em;
          background-color: rgba(0, 0, 255, 0.6);
        }

.btn:hover {
  background-color: rgba(127, 157, 181, 1);
  box-shadow: 0.5em 0.5em 0.2em rgba(110, 255, 80, 0.7);
}

.btn:hover:before {
  top: 10;
  right: 60;
}
.btn:hover:after {
  bottom: 10;
  left: 60;
}
		</style>
    <body>
		<h3>Can't believe you're really here</h3>
        <div><input id="qr_text" type="text" placeholder="Enter URI or something"/></div>
        <br/>
        <div>
            <button class="btn" onclick="qr_generator()">Generate QR Code</button>
        </div>
        <br/>
        <p id="qr_result">Default QR code</p>
        <canvas id="qr_code"></canvas>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
		<script>
			var qr;
			(function() {
                    qr = new QRious({
                    element: document.getElementById('qr_code'),
                    size: 150,
                    value: 'varunhc.github.io'
                });
            })();

            function qr_generator() {
                var qrtext = document.getElementById("qr_text").value;
                document.getElementById("qr_result").innerHTML = "QR code for " + qrtext +":";
                qr.set({
                    foreground: 'black',
                    size: 150,
                    value: qrtext
                });
            }
		</script>

	</body>
</html>
